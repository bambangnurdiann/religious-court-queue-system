version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: queue_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/queue_system
      BETTER_AUTH_URL: http://localhost:3000
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      NEXT_PUBLIC_VAPID_KEY: ${VAPID_PUBLIC_KEY}
      COURT_NAME: Pengadilan Agama Jakarta Pusat
    depends_on:
      - postgres

volumes:
  pgdata:
